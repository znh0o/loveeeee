<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple App 💖</title>

<style>
* { box-sizing:border-box; }
body { margin:0; font-family:sans-serif; background:#ffeef3; }

.screen { display:none; height:100vh; flex-direction:column; }
.active { display:flex; }

.center {
  justify-content:center;
  align-items:center;
}

.box {
  width:90%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title {
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff5d8f;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
}

/* chat */
.header {
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
}

.chat {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:16px;
  margin-bottom:12px;
}

.me { background:#ff8fab; color:white; margin-left:auto; }
.other { background:white; }

.inputBar {
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
}

.inputBar textarea {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}
</style>
</head>

<body>

<!-- 로그인 -->
<div id="login" class="screen active center">
  <div class="box">

    <div class="title">💖 Couple Chat</div>

    <input id="room" placeholder="커플 코드">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">✨ 방 만들기</button>
    <button onclick="enterRoom()">💬 입장하기</button>

  </div>
</div>

<!-- 채팅 -->
<div id="app" class="screen">
  <div class="header">
    💬 Chat
    <button onclick="logout()" style="float:right;width:80px;">나가기</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b",
  storageBucket: "first-app-ffb0b.firebasestorage.app",
  messagingSenderId: "948722690899",
  appId: "1:948722690899:web:baa8bcc7b15b4f9e02cfa6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 💖 방 생성
function createRoom(){
  const code = Math.random().toString(36).substring(2,7).toLowerCase();

  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({
    messages:{}
  }).then(()=>{
    alert("방 생성됨: " + code);
    console.log("CREATE OK:", code);
  }).catch(err=>{
    console.log("CREATE FAIL:", err);
    alert("생성 실패");
  });
}


// 💬 입장 (핵심 수정)
function enterRoom(){

  // 🔥 핵심: trim + 소문자 정리
  roomId = document.getElementById("room").value.trim().toLowerCase();
  userName = document.getElementById("name").value.trim();

  console.log("ENTER TRY:", roomId);

  if(!roomId || !userName){
    alert("입력!");
    return;
  }

  const ref = db.ref("rooms/"+roomId);

  ref.once("value")
    .then(snap=>{

      console.log("DB DATA:", snap.val());

      if(!snap.exists()){
        alert("없는 방 (Firebase에 없음)");
        return;
      }

      localStorage.setItem("roomId", roomId);
      localStorage.setItem("userName", userName);

      showApp();
      loadChat();
    })
    .catch(err=>{
      console.log("ERROR:", err);
      alert("Firebase 오류");
    });
}


// 💬 화면 전환
function showApp(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("app").classList.add("active");
}


// 💬 전송
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}


// 💬 로딩
function loadChat(){
  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    const data = snap.val();
    if(!data) return;

    for(let id in data){
      const m = data[id];
      const me = m.name === userName;

      chat.innerHTML += `
        <div class="msg ${me?'me':'other'}">${m.text}</div>
      `;
    }

    chat.scrollTop = chat.scrollHeight;
  });
}


// 🚪 로그아웃
function logout(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
