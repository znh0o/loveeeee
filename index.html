<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple App 💖</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#ffeef3;
}

/* 화면 */
.screen{
  display:none;
  height:100vh;
  flex-direction:column;
  opacity:0;
  transform:translateY(10px);
  transition:0.25s ease;
}

.active{
  display:flex;
  opacity:1;
  transform:translateY(0);
}

/* 홈 */
.home{
  justify-content:center;
  align-items:center;
  text-align:center;
}

.dday{
  font-size:44px;
  font-weight:bold;
  color:#ff5d8f;
}

/* 카드 */
.card{
  width:90%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  margin-top:10px;
}

/* input */
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

/* 버튼 */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
}

/* 채팅 */
.header{
  padding:12px;
  background:white;
  font-weight:bold;
}

.chat{
  flex:1;
  padding:12px;
  overflow-y:auto;
}

/* 말풍선 */
.msg{
  max-width:70%;
  padding:10px 12px;
  margin:6px 0;
  border-radius:16px;
  word-break:break-word;
  animation:pop 0.15s ease;
}

.me{
  background:#ff8fab;
  color:white;
  margin-left:auto;
  border-bottom-right-radius:4px;
}

.other{
  background:white;
  border-bottom-left-radius:4px;
}

@keyframes pop{
  from{ transform:scale(0.95); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

/* 입력창 */
.inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  background:white;
}

textarea{
  flex:1;
  border:none;
  border-radius:12px;
  padding:10px;
  background:#f5f5f5;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active home">

  <div class="dday" id="dday">D+0</div>

  <div class="card">
    <input type="date" id="startDate">
    <button onclick="saveDate()">💖 시작일 저장</button>
  </div>

  <div class="card">
    <input id="room" placeholder="커플 코드">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">✨ 방 만들기</button>
    <button onclick="enterRoom()">💬 입장</button>
  </div>

</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">

  <div class="header">
    💬 Couple Chat
    <button onclick="goHome()" style="float:right;width:70px;">홈</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 💖 방 생성 */
function createRoom(){
  const code = Math.random().toString(36).substring(2,6).toLowerCase();

  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({
    messages:{}
  });

  alert("방 생성됨: " + code);
}

/* 💬 입장 */
function enterRoom(){
  roomId = document.getElementById("room").value.trim();
  userName = document.getElementById("name").value.trim();

  if(!roomId || !userName){
    alert("입력!");
    return;
  }

  db.ref("rooms/"+roomId).once("value")
  .then(snap=>{
    if(!snap.exists()){
      alert("없는 방");
      return;
    }

    showChat();
    loadChat();
  });
}

/* 💬 전송 */
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}

/* 💬 채팅 */
function loadChat(){
  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    snap.forEach(child=>{
      const m = child.val();

      const isMe = m.name === userName;

      chat.innerHTML += `
        <div class="msg ${isMe?'me':'other'}">
          ${m.text}
        </div>
      `;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}

/* 🏠 화면 전환 */
function showChat(){
  document.getElementById("home").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");
}

function goHome(){
  document.getElementById("chatScreen").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

/* 💖 D-day */
function saveDate(){
  localStorage.setItem("start", document.getElementById("startDate").value);
  updateDday();
}

function updateDday(){
  const d = localStorage.getItem("start");
  if(!d) return;

  const diff = Math.floor((new Date() - new Date(d)) / 86400000) + 1;
  document.getElementById("dday").innerText = "D+" + diff;
}

updateDday();
</script>

</body>
</html>
