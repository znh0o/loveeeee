<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple Service 💖</title>

<style>
* { box-sizing:border-box; }
body { margin:0; font-family:sans-serif; background:#ffeef3; }

.screen { display:none; height:100vh; flex-direction:column; }
.active { display:flex; }

.center {
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox {
  width:90%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title {
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff5d8f;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* 채팅 */
.header {
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
  font-weight:bold;
}

.chat {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:16px;
  margin-bottom:14px;
}

.me { background:#ff8fab; color:white; margin-left:auto; }
.other { background:white; }

.inputBar {
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
}

.inputBar textarea {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}
</style>
</head>

<body>

<!-- 🔐 시작 화면 (방 생성 + 입장) -->
<div id="loginScreen" class="screen active center">
  <div class="loginBox">

    <div class="title">💖 Couple Service</div>

    <input id="room" placeholder="커플 코드 (없으면 생성)">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">✨ 방 만들기</button>
    <button onclick="enterRoom()">💬 입장하기</button>

  </div>
</div>

<!-- 💬 채팅 화면 -->
<div id="appScreen" class="screen">
  <div class="header">
    💖 Couple Chat
    <button onclick="logout()" style="float:right;width:80px;">로그아웃</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b",
  storageBucket: "first-app-ffb0b.firebasestorage.app",
  messagingSenderId: "948722690899",
  appId: "1:948722690899:web:baa8bcc7b15b4f9e02cfa6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 💖 자동 로그인
window.onload = function(){
  const r = localStorage.getItem("roomId");
  const n = localStorage.getItem("userName");

  if(r && n){
    roomId = r;
    userName = n;

    showApp();
    loadChat();
  }
}


// 💖 방 생성
function createRoom(){
  const code = Math.random().toString(36).substring(2,7);
  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({
    owner:"",
    partner:"",
    messages:{}
  });

  alert("방 생성됨: " + code);
}


// 💖 입장
function enterRoom(){
  roomId = document.getElementById("room").value;
  userName = document.getElementById("name").value;

  if(!roomId || !userName){
    alert("입력해!");
    return;
  }

  db.ref("rooms/"+roomId).once("value", snap=>{
    const data = snap.val();

    if(!data){
      alert("없는 방");
      return;
    }

    localStorage.setItem("roomId", roomId);
    localStorage.setItem("userName", userName);

    showApp();
    loadChat();
  });
}


// 💖 화면 전환
function showApp(){
  document.getElementById("loginScreen").classList.remove("active");
  document.getElementById("appScreen").classList.add("active");
}


// 💬 전송
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}


// 💬 채팅 로드
function loadChat(){
  const chatBox = document.getElementById("chat");

  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    chatBox.innerHTML="";
    const data = snap.val();
    if(!data) return;

    for(let id in data){
      const m = data[id];
      const isMe = m.name === userName;

      chatBox.innerHTML += `
        <div class="msg ${isMe?'me':'other'}">${m.text}</div>
      `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}


// 💖 로그아웃
function logout(){
  localStorage.removeItem("roomId");
  localStorage.removeItem("userName");
  location.reload();
}
</script>

</body>
</html>
