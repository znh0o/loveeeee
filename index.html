<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple Day 💖</title>

<style>
* { box-sizing:border-box; }
body { margin:0; font-family:'Pretendard', sans-serif; background:#ffeef3; }

.screen { display:none; height:100vh; flex-direction:column; }
.active { display:flex; }

.home { padding:20px; max-width:420px; margin:auto; }

.big-dday {
  text-align:center;
  font-size:42px;
  font-weight:bold;
  color:#ff5d8f;
  margin-top:40px;
}

.card {
  background:white;
  border-radius:20px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

input, textarea {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
  margin-top:10px;
}

.codeBox {
  background:#fff0f5;
  padding:10px;
  border-radius:12px;
  text-align:center;
  margin-top:10px;
  font-weight:bold;
  color:#ff5d8f;
}

.header {
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
  font-weight:bold;
}

.chat { flex:1; padding:15px; overflow-y:auto; }

.msg {
  max-width:70%;
  padding:10px;
  border-radius:16px;
  margin-bottom:14px;
}

.me { background:#ff8fab; color:white; margin-left:auto; }
.other { background:white; }

.inputBar {
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
}

.inputBar textarea { flex:1; }
.inputBar button { width:70px; }
</style>
</head>

<body>

<div id="home" class="screen active">
  <div class="home">
    <div class="big-dday" id="dday">D+0</div>

    <div class="card">
      <input type="date" id="start">
      <button onclick="saveDate()">시작 날짜 저장</button>
    </div>

    <div class="card">
      <input id="room" placeholder="커플 코드 입력">
      <input id="name" placeholder="내 이름">

      <button onclick="createRoom()">✨ 방 만들기</button>
      <button onclick="copyCode()">📋 코드 복사</button>

      <div id="codeDisplay" class="codeBox">코드 없음</div>

      <button onclick="connect()">💬 채팅 시작</button>
    </div>
  </div>
</div>

<div id="chatScreen" class="screen">
  <div class="header" onclick="goHome()">← 홈</div>
  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b",
  storageBucket: "first-app-ffb0b.firebasestorage.app",
  messagingSenderId: "948722690899",
  appId: "1:948722690899:web:baa8bcc7b15b4f9e02cfa6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 방 생성
function createRoom(){
  const code = Math.random().toString(36).substring(2,7);
  document.getElementById("room").value = code;
  document.getElementById("codeDisplay").innerText = "💖 코드: " + code;
}

// 복사
function copyCode(){
  const room = document.getElementById("room").value;
  if(!room) return alert("코드 먼저 만들어!");
  navigator.clipboard.writeText(room);
  alert("복사됨!");
}

// 연결
function connect(){
  roomId = document.getElementById("room").value;
  userName = document.getElementById("name").value;

  if(!roomId || !userName){
    alert("코드랑 이름 입력해!");
    return;
  }

  document.getElementById("home").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");

  loadChat();
}

// 전송
function send(){
  const msgInput = document.getElementById("msg");
  if(!msgInput.value) return;

  db.ref("chat/"+roomId).push({
    name:userName,
    text:msgInput.value
  });

  msgInput.value="";
}

// 채팅 로드
function loadChat(){
  const chatBox = document.getElementById("chat");

  db.ref("chat/"+roomId).on("value", snap=>{
    chatBox.innerHTML="";
    const data = snap.val();
    if(!data) return;

    for(let id in data){
      const m=data[id];
      const isMe = m.name===userName;

      chatBox.innerHTML+=`
        <div class="msg ${isMe?'me':'other'}">${m.text}</div>
      `;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 홈
function goHome(){
  document.getElementById("chatScreen").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

// 디데이
function saveDate(){
  const val = document.getElementById("start").value;
  localStorage.setItem("start", val);
  updateDday();
}

function updateDday(){
  const d = localStorage.getItem("start");
  if(!d) return;

  const diff = Math.floor((new Date()-new Date(d))/86400000)+1;
  document.getElementById("dday").innerText = "D+"+diff;
}

updateDday();
</script>

</body>
</html>
