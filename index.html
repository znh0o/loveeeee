<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple Chat v1 💖</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#ffeef3;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:10px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#f5f5f5;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
}

#chat{
  height:300px;
  overflow-y:auto;
  background:#fff;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:6px 10px;
  margin:5px 0;
  background:#f1f1f1;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="wrap">

  <h2>💖 Couple Chat</h2>

  <div class="card">
    <input id="room" placeholder="커플 코드">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">방 만들기</button>
    <button onclick="enterRoom()">입장하기</button>
  </div>

  <div class="card">
    <div id="chat"></div>

    <input id="msg" placeholder="메시지">
    <button onclick="send()">전송</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomId = "";
let userName = "";


// 💖 방 생성
function createRoom(){
  const code = Math.random().toString(36).substring(2,6);
  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({
    messages: {}
  });

  alert("방 생성됨: " + code);
}


// 💬 입장
function enterRoom(){
  roomId = document.getElementById("room").value.trim();
  userName = document.getElementById("name").value.trim();

  if(!roomId || !userName){
    alert("입력해");
    return;
  }

  db.ref("rooms/"+roomId).once("value")
  .then(snap=>{
    if(!snap.exists()){
      alert("없는 방");
      return;
    }

    loadChat();
  });
}


// 💬 전송
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}


// 💬 채팅 불러오기
function loadChat(){
  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(child=>{
      const m = child.val();
      chat.innerHTML += `
        <div class="msg"><b>${m.name}</b>: ${m.text}</div>
      `;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}
</script>

</body>
</html>
