<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple App 💖</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#ffeef3;
}

.screen{
  display:none;
  height:100vh;
  flex-direction:column;
}

.active{ display:flex; }

.center{
  justify-content:center;
  align-items:center;
}

.box{
  width:90%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
}

/* CHAT */
.header{
  padding:12px;
  background:white;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  max-width:70%;
  padding:10px;
  margin:6px 0;
  border-radius:14px;
  background:#f1f1f1;
}

.me{
  background:#ff8fab;
  color:white;
  margin-left:auto;
}

.inputBar{
  display:flex;
  padding:10px;
  gap:8px;
  background:white;
}

textarea{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
  background:#f5f5f5;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active center">
  <div class="box">

    <h3>💖 Couple App</h3>

    <input id="room" placeholder="커플 코드">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">방 만들기</button>
    <button onclick="enterRoom()">입장</button>

  </div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="header">
    💬 Chat
    <button onclick="logout()" style="float:right;width:70px;">나가기</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 💖 방 생성 (절대 안 깨지는 구조)
function createRoom(){

  const code = Math.random().toString(36).substring(2,6).toLowerCase();

  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({
    createdAt: Date.now(),
    messages: {
      system: {
        name:"system",
        text:"room created"
      }
    }
  });

  alert("방 생성됨: " + code);
}


// 💬 입장 (완전 안정 버전)
function enterRoom(){

  roomId = document.getElementById("room").value.trim().toLowerCase();
  userName = document.getElementById("name").value.trim();

  if(!roomId || !userName){
    alert("입력!");
    return;
  }

  const ref = db.ref("rooms/"+roomId);

  ref.once("value").then(snap=>{

    console.log("ROOM DATA:", snap.val());

    // 🔥 핵심 안정 체크
    if(!snap.exists()){
      alert("없는 방 (Firebase 없음)");
      return;
    }

    const data = snap.val();

    if(!data.messages){
      alert("방 데이터 깨짐");
      return;
    }

    showChat();
    loadChat();
  });
}


// 💬 전송
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}


// 💬 채팅 로딩
function loadChat(){
  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    snap.forEach(child=>{
      const m = child.val();

      if(m.name === "system") return;

      const me = m.name === userName;

      chat.innerHTML += `
        <div class="msg ${me?'me':'other'}">${m.text}</div>
      `;
    });

    chat.scrollTop = chat.scrollHeight;
  });
}


// 화면 전환
function showChat(){
  document.getElementById("login").classList.remove("active");
  document.getElementById("chatScreen").classList.add("active");
}


// 로그아웃
function logout(){
  location.reload();
}
</script>

</body>
</html>
