<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Couple App 💖</title>

<style>
* { box-sizing:border-box; }
body {
  margin:0;
  font-family:sans-serif;
  background:#ffeef3;
}

/* ===== 화면 구조 ===== */
.screen {
  position:absolute;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  display:none;
  opacity:0;
  transform:translateX(30px);
  transition:all 0.4s ease;
}

.active {
  display:flex;
  opacity:1;
  transform:translateX(0);
}

/* ===== 공통 ===== */
.center {
  justify-content:center;
  align-items:center;
}

/* ===== 박스 ===== */
.box {
  width:90%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.title {
  text-align:center;
  font-size:26px;
  font-weight:bold;
  color:#ff5d8f;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  margin-top:10px;
  background:#ff8fab;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:active {
  transform:scale(0.97);
}

/* ===== 홈 ===== */
.homeTitle {
  font-size:32px;
  font-weight:bold;
  color:#ff5d8f;
  text-align:center;
}

.card {
  background:white;
  padding:20px;
  border-radius:18px;
  margin-top:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  text-align:center;
}

/* ===== 채팅 ===== */
.header {
  padding:12px;
  background:white;
  border-bottom:1px solid #eee;
}

.chat {
  flex:1;
  padding:15px;
  overflow-y:auto;
}

.msg {
  max-width:70%;
  padding:10px;
  border-radius:16px;
  margin-bottom:12px;
  animation:fadeIn 0.2s ease;
}

.me { background:#ff8fab; color:white; margin-left:auto; }
.other { background:white; }

.inputBar {
  display:flex;
  gap:8px;
  padding:10px;
  background:white;
}

.inputBar textarea {
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#f5f5f5;
}

/* ===== 애니메이션 ===== */
@keyframes fadeIn {
  from { opacity:0; transform:translateY(10px); }
  to { opacity:1; transform:translateY(0); }
}
</style>
</head>

<body>

<!-- 🔐 로그인 -->
<div id="login" class="screen active center">
  <div class="box">

    <div class="title">💖 Couple App</div>

    <input id="room" placeholder="커플 코드">
    <input id="name" placeholder="이름">

    <button onclick="createRoom()">✨ 방 만들기</button>
    <button onclick="enterRoom()">➡ 입장</button>

  </div>
</div>

<!-- 🏠 홈 -->
<div id="home" class="screen center">
  <div class="box">

    <div class="homeTitle">💖 우리 커플</div>

    <div class="card">
      <div>방 코드</div>
      <b id="showRoom"></b>
    </div>

    <button onclick="goChat()">💬 채팅 들어가기</button>
    <button onclick="logout()">🚪 로그아웃</button>

  </div>
</div>

<!-- 💬 채팅 -->
<div id="chatScreen" class="screen">
  <div class="header">
    💬 Chat
    <button onclick="goHome()" style="float:right;width:80px;">홈</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBar">
    <textarea id="msg"></textarea>
    <button onclick="send()">전송</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let roomId = "";
let userName = "";

const firebaseConfig = {
  apiKey: "AIzaSyClSapSfkfkzoWMxHVlls1UjIRO4bHl1Fc",
  authDomain: "first-app-ffb0b.firebaseapp.com",
  databaseURL: "https://first-app-ffb0b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "first-app-ffb0b",
  storageBucket: "first-app-ffb0b.firebasestorage.app",
  messagingSenderId: "948722690899",
  appId: "1:948722690899:web:baa8bcc7b15b4f9e02cfa6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


// 🔥 방 생성
function createRoom(){
  const code = Math.random().toString(36).substring(2,7);
  document.getElementById("room").value = code;

  db.ref("rooms/"+code).set({ messages:{} });

  alert("방 생성됨: " + code);
}


// 🔥 입장 → 홈 이동
function enterRoom(){
  roomId = document.getElementById("room").value;
  userName = document.getElementById("name").value;

  if(!roomId || !userName){
    alert("입력!");
    return;
  }

  db.ref("rooms/"+roomId).once("value").then(snap=>{
    if(!snap.exists()){
      alert("없는 방");
      return;
    }

    localStorage.setItem("roomId", roomId);
    localStorage.setItem("userName", userName);

    document.getElementById("showRoom").innerText = roomId;

    showScreen("home");
  });
}


// 🏠 홈 → 채팅
function goChat(){
  showScreen("chatScreen");
  loadChat();
}


// 🏠 채팅 → 홈
function goHome(){
  showScreen("home");
}


// 💬 전송
function send(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;

  db.ref("rooms/"+roomId+"/messages").push({
    name:userName,
    text:msg
  });

  document.getElementById("msg").value="";
}


// 💬 채팅
function loadChat(){
  db.ref("rooms/"+roomId+"/messages").on("value", snap=>{
    const chat = document.getElementById("chat");
    chat.innerHTML="";

    const data = snap.val();
    if(!data) return;

    for(let id in data){
      const m = data[id];
      const me = m.name === userName;

      chat.innerHTML += `
        <div class="msg ${me?'me':'other'}">${m.text}</div>
      `;
    }

    chat.scrollTop = chat.scrollHeight;
  });
}


// 🎞 화면 전환 (애니메이션 핵심)
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{
    s.classList.remove("active");
  });

  setTimeout(()=>{
    document.getElementById(id).classList.add("active");
  }, 50);
}


// 🚪 로그아웃
function logout(){
  localStorage.clear();
  location.reload();
}
</script>

</body>
</html>
